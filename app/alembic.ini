[alembic]
# path to migration scripts
script_location = alembic
# directory is an alias for script_location in some versions but
# alembic upgrade requires script_location explicitly
directory = alembic

[alembic:runtime]
# the sql script output directory
target_metadata = app.models.Base.metadata

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s

[logger_sqlalchemy]
level = WARN
handlers = console
qualname = sqlalchemy

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[sqlalchemy]
# use env var or default connection
url = postgresql+asyncpg://postgres:password@localhost:5432/postgres
